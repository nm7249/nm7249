<svg width="100%" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">

      <!-- Slowly moving gradient -->
      <animate attributeName="x1"
               values="0%;-10%;0%;10%;0%"
               dur="24s"
               repeatCount="indefinite"/>

      <animate attributeName="y1"
               values="0%;5%;0%;-5%;0%"
               dur="28s"
               repeatCount="indefinite"/>

      <animate attributeName="x2"
               values="100%;110%;100%;90%;100%"
               dur="24s"
               repeatCount="indefinite"/>

      <animate attributeName="y2"
               values="0%;-5%;0%;5%;0%"
               dur="28s"
               repeatCount="indefinite"/>

      <!-- Left -->
      <stop offset="0%" stop-color="#FBBF24">
        <animate attributeName="stop-color"
          values="#FBBF24;#FFD86B;#FBBF24"
          dur="18s"
          repeatCount="indefinite"/>
      </stop>

      <!-- Center -->
      <stop offset="50%" stop-color="#FB7185">
        <animate attributeName="stop-color"
          values="#FB7185;#F59EAE;#FB7185"
          dur="20s"
          repeatCount="indefinite"/>
      </stop>

      <!-- Right -->
      <stop offset="100%" stop-color="#14B8A6">
        <animate attributeName="stop-color"
          values="#14B8A6;#5EEAD4;#14B8A6"
          dur="22s"
          repeatCount="indefinite"/>
      </stop>

    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#flow)"/>

  <!-- Floating wave -->
  <path
      d="M0,150 C300,200 900,120 1200,165 L1200,200 L0,200 Z"
      fill="url(#flow)"
      opacity="0.28">

      <animateTransform
          attributeName="transform"
          type="translate"
          values="0 0;0 -4;0 4;0 0"
          dur="14s"
          repeatCount="indefinite"/>

  </path>

  <text
      x="50%"
      y="42%"
      text-anchor="middle"
      font-size="55"
      font-family="Verdana, Geneva, sans-serif"
      font-weight="bold"
      fill="#1a1a2e">

      Neha Maurya

  </text>

  <text
      x="50%"
      y="60%"
      text-anchor="middle"
      font-size="18"
      font-family="Verdana, Geneva, sans-serif"
      fill="#1a1a2e">

      Software Engineer • Data Science • Full Stack Development

  </text>

</svg>
