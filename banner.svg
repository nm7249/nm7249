<svg width="100%" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0" spreadMethod="repeat">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#FB7185"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="1 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- main banner background: flowing gradient -->
  <rect x="0" y="0" width="1200" height="200" fill="url(#flow)"/>

  <!-- decorative bottom wave, same flowing gradient, layered for depth -->
  <path d="M0,150 C300,200 900,120 1200,165 L1200,200 L0,200 Z" fill="url(#flow)" opacity="0.55"/>

  <text x="50%" y="42%" text-anchor="middle" font-size="55" font-family="Verdana, Geneva, sans-serif" font-weight="bold" fill="#1a1a2e">Neha Maurya</text>
  <text x="50%" y="60%" text-anchor="middle" font-size="18" font-family="Verdana, Geneva, sans-serif" fill="#1a1a2e">Software Engineer • Data Science • Full Stack Development</text>
</svg>
